<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, "Apple SD Gothic Neo", sans-serif;
        font-size: 13px;
        color: #1b1f27;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      h1 span {
        color: #3d7bf6;
      }
      p {
        color: #667;
        margin: 0 0 12px;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 12px;
        color: #667;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #d0d5dd;
        border-radius: 7px;
        font-size: 13px;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 9px;
        background: #3d7bf6;
        color: #fff;
        border: none;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .saved {
        color: #15a34a;
        font-size: 12px;
        margin-top: 8px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1><span>Algo</span>Note Capture</h1>
    <p>프로그래머스 문제 페이지에서 우측 하단 <b>📝 버튼</b>을 누르면 문제·정답코드가 AlgoNote 에디터로 전송됩니다.</p>
    <label>AlgoNote 웹앱 주소</label>
    <input id="appUrl" type="url" placeholder="http://localhost:3000" />
    <button id="save">저장</button>
    <div class="saved" id="saved"></div>
    <script src="popup.js"></script>
  </body>
</html>
